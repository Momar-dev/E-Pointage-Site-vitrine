  <meta charset="utf-8" />

  <!-- iOS PWA tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="E-Pointage" />
  <link rel="apple-touch-icon" href="/app-mobile/pwa-icon.png" />
  <link rel="manifest" href="/app-mobile/manifest.json" />

  <meta name="theme-color" content="#2596be">
  <link rel="icon" href="/app-mobile/favicon.ico" />

  <!-- The `react-native-web` recommended style reset -->
  <style id="expo-reset">
    /* iOS PWA - méthode standard pour bloquer le scroll du body */
    html {
      height: -webkit-fill-available;
      overflow: hidden;
      background-color: #2596be; /* Retour au BLEU pour le Splash */
    }

    body {
      height: 100%;
      min-height: -webkit-fill-available;
      overflow: hidden;
      position: fixed;
      width: 100%;
      margin: 0;
      background-color: #2596be; /* Retour au BLEU pour le Splash */
      touch-action: none;
    }

    #root {
      height: 100%;
      overflow: hidden;
      display: flex;
      flex: 1;
      background-color: #ffffff; /* BLANC ici pour l'application */
    }

    /* Autoriser le scroll UNIQUEMENT dans les ScrollView de React Native Web */
    [style*="overflow-y: auto"],
    [style*="overflow-y:auto"],
    [style*="overflow-y: scroll"],
    [style*="overflow-y:scroll"],
    [style*="overflow: scroll"],
    [style*="overflow:scroll"],
    [style*="overflow-x: hidden"][style*="overflow-y:"],
    [style*="overflow-x:hidden"][style*="overflow-y:"],
    [id^="pwa-scrollable"],
    #pwa-scrollable-profile,
    #pwa-scrollable-history,
    #pwa-scrollable-home {
      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch !important;
      overscroll-behavior: contain !important;
      touch-action: pan-y !important; /* Permet le défilement vertical */
    }

    /* Force la barre d'onglets tout en bas en mode PWA sur iPhone */
    @media all and (display-mode: standalone) {
      /* Cible la TabBar de React Navigation */
      div[role="tablist"], 
      div[style*="position: fixed"][style*="bottom: 0"],
      div[style*="position:absolute"][style*="bottom:0"] {
        bottom: 0 !important;
        /* Ajoute l'espace pour la barre iPhone mais SANS créer de vide en dessous */
        padding-bottom: env(safe-area-inset-bottom) !important;
        background-color: #ffffff !important; /* Force le fond blanc de la barre */
        border-top: 1px solid rgba(0,0,0,0.05) !important;
      }
    }
  </style>
<meta name="theme-color" content="#2596be">
<link rel="icon" href="/app-mobile/favicon.ico" /></head>

<body>
  <noscript>Vous devez activer le JavaScript pour faire fonctionner cette application.</noscript>
  <div id="root"></div>
  <script>
    // Service Worker pour le mode hors-ligne
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/app-mobile/sw.js')
          .then(reg => console.log('Service Worker enregistré', reg.scope))
          .catch(err => console.log('Erreur Service Worker', err));
      });
    }

    // Bloquer le scroll du body pour empêcher l'apparition
    // de la barre Safari lors des interactions tactiles
    document.addEventListener('touchmove', function (e) {
      if (e.target === document.body || e.target === document.documentElement) {
        e.preventDefault();
      }
    }, { passive: false });

    // Empêcher le "double-tap to zoom" de Safari qui déclenche le chrome
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (e) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>

</body>
