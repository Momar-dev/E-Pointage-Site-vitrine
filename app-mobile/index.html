<head>
  <meta charset="utf-8" />

  <title>E-Pointage</title>

  <!-- iOS PWA tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="E-Pointage" />
  <link rel="apple-touch-icon" href="/app-mobile/pwa-icon.png" />
  <link rel="manifest" href="/app-mobile/manifest.json" />

  <meta name="theme-color" content="#2596be">
  <link rel="icon" href="/app-mobile/favicon.ico" />

  <style id="expo-reset">
    /*
     * FOND BLANC partout — le splash screen bleu est géré par le COMPOSANT React
     * (SplashScreen.js a son propre backgroundColor: #2596be)
     * Plus besoin de mettre le bleu ici, ça causait des bandes bleues visibles.
     */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      overflow: hidden;
      position: fixed;
    }

    html {
      height: -webkit-fill-available;
    }

    body {
      min-height: -webkit-fill-available;
    }

    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex: 1;
      background-color: #ffffff;
    }

    /*
     * SCROLL SUR IPHONE PWA
     * Libère le scroll pour tous les éléments scrollables générés par React Native Web.
     * Sans cela, touch-action: none bloque tout sur iOS Safari PWA.
     */
    [style*="overflow-y: scroll"],
    [style*="overflow-y:scroll"],
    [style*="overflow-y: auto"],
    [style*="overflow-y:auto"],
    [id^="pwa-scrollable"] {
      -webkit-overflow-scrolling: touch !important;
      overscroll-behavior-y: contain !important;
      touch-action: pan-y !important;
    }
  </style>
<meta name="theme-color" content="#2596be">
<link rel="icon" href="/app-mobile/favicon.ico" /></head>

<body>
  <noscript>Vous devez activer le JavaScript pour faire fonctionner cette application.</noscript>
  <div id="root"></div>
  <script>
    // Service Worker pour le mode hors-ligne
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/app-mobile/sw.js')
          .then(reg => console.log('SW enregistré', reg.scope))
          .catch(err => console.log('SW erreur', err));
      });
    }

    /*
     * BLOQUER LE SCROLL PARASITE SUR IPHONE (sans bloquer les ScrollView)
     * On remonte l'arbre DOM depuis la cible du toucher.
     * Si on trouve un élément scrollable, on laisse passer le geste.
     * Sinon on bloque (empêche la barre Safari d'apparaître).
     */
    document.addEventListener('touchmove', function (e) {
      let el = e.target;
      while (el && el !== document.body) {
        const style = window.getComputedStyle(el);
        const oy = style.overflowY;
        const ox = style.overflowX;
        if (oy === 'scroll' || oy === 'auto' || ox === 'scroll' || ox === 'auto') {
          return; // Élément scrollable trouvé → laisser passer
        }
        el = el.parentElement;
      }
      e.preventDefault(); // Aucun ancêtre scrollable → bloquer
    }, { passive: false });

    // Bloquer double-tap zoom Safari
    let lastTouch = 0;
    document.addEventListener('touchend', function (e) {
      const now = Date.now();
      if (now - lastTouch <= 300) e.preventDefault();
      lastTouch = now;
    }, false);
  </script>
<script src="/app-mobile/_expo/static/js/web/index-9c9033dca4e515b956bfe61581227f9c.js" defer></script>
</body>
