  <style id="expo-reset">
    /* Fond bleu pendant le chargement (splash screen) */
    html {
      height: -webkit-fill-available;
      overflow: hidden;
      background-color: #2596be;
    }

    body {
      height: 100%;
      min-height: -webkit-fill-available;
      overflow: hidden;
      position: fixed;
      width: 100%;
      margin: 0;
      padding: 0;
      background-color: #2596be;
      /* NE PAS mettre touch-action: none ici — ça bloque tout le scroll */
    }

    #root {
      height: 100%;
      overflow: hidden;
      display: flex;
      flex: 1;
      background-color: #ffffff;
    }

    /*
     * SCROLL SUR IPHONE PWA
     * React Native Web génère des divs avec overflow-y: scroll ou auto.
     * On s'assure que ces divs peuvent recevoir les gestes tactiles.
     */
    [style*="overflow-y: scroll"],
    [style*="overflow-y:scroll"],
    [style*="overflow-y: auto"],
    [style*="overflow-y:auto"],
    [id^="pwa-scrollable"] {
      -webkit-overflow-scrolling: touch !important;
      overscroll-behavior-y: contain !important;
      touch-action: pan-y !important;
    }
  </style>
<meta name="theme-color" content="#2596be">
<link rel="icon" href="/app-mobile/favicon.ico" /></head>

<body>
  <noscript>Vous devez activer le JavaScript pour faire fonctionner cette application.</noscript>
  <div id="root"></div>
  <script>
    // Service Worker pour le mode hors-ligne
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/app-mobile/sw.js')
          .then(reg => console.log('Service Worker enregistré', reg.scope))
          .catch(err => console.log('Erreur Service Worker', err));
      });
    }

    /*
     * BLOQUER LE SCROLL PARASITE SUR IPHONE
     * On bloque uniquement les touchmove qui viennent du body ou html directement.
     * Si le touchmove vient d'un élément scrollable (ScrollView), on le laisse passer.
     */
    document.addEventListener('touchmove', function (e) {
      // Chercher si un ancêtre est un élément scrollable
      let target = e.target;
      while (target && target !== document.body) {
        const style = window.getComputedStyle(target);
        const overflowY = style.getPropertyValue('overflow-y');
        const overflowX = style.getPropertyValue('overflow-x');
        if (overflowY === 'scroll' || overflowY === 'auto' ||
            overflowX === 'scroll' || overflowX === 'auto') {
          // C'est un élément scrollable → on laisse le geste passer
          return;
        }
        target = target.parentElement;
      }
      // Pas d'élément scrollable trouvé → on bloque
      e.preventDefault();
    }, { passive: false });

    // Empêcher le "double-tap to zoom" de Safari
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (e) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>
