<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <title>E-Pointage</title>

    <!-- iOS PWA tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="E-Pointage" />
    <link rel="apple-touch-icon" href="/app-mobile/pwa-icon.png" />
    <link rel="manifest" href="/app-mobile/manifest.json" />
    
    <meta name="theme-color" content="#2596be">
    <link rel="icon" href="/app-mobile/favicon.ico" />

    <!-- The `react-native-web` recommended style reset -->
    <style id="expo-reset">
      /* iOS PWA - méthode standard pour bloquer le scroll du body */
      html {
        height: -webkit-fill-available;
        overflow: hidden;
      }
      body {
        height: 100%;
        min-height: -webkit-fill-available;
        overflow: hidden;
        position: fixed;   /* La clé : empêche le scroll global sur iOS */
        width: 100%;
        margin: 0;
        background-color: #2596be;
        touch-action: none; /* Bloque les gestes parasites */
      }
      #root {
        height: 100%;
        overflow: hidden;
        display: flex;
        flex: 1;
      }
      /* Autoriser le scroll UNIQUEMENT dans les ScrollView de React Native Web */
      [style*="overflow-y: scroll"],
      [style*="overflow-y:scroll"],
      [style*="overflow: scroll"],
      [style*="overflow:scroll"],
      [style*="overflow-x: hidden"][style*="overflow-y:"],
      [style*="overflow-x:hidden"][style*="overflow-y:"] {
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
        overscroll-behavior: contain;
        touch-action: pan-y !important;
      }
    </style>
  <meta name="theme-color" content="#2596be">
<link rel="icon" href="/app-mobile/favicon.ico" /></head>
  <body>
    <noscript>Vous devez activer le JavaScript pour faire fonctionner cette application.</noscript>
    <div id="root"></div>
    <script>
      // Service Worker pour le mode hors-ligne
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/app-mobile/sw.js')
            .then(reg => console.log('Service Worker enregistré', reg.scope))
            .catch(err => console.log('Erreur Service Worker', err));
        });
      }

      // Bloquer le scroll du body pour empêcher l'apparition
      // de la barre Safari lors des interactions tactiles
      document.addEventListener('touchmove', function(e) {
        if (e.target === document.body || e.target === document.documentElement) {
          e.preventDefault();
        }
      }, { passive: false });

      // Empêcher le "double-tap to zoom" de Safari qui déclenche le chrome
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function(e) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
    </script>
  <script src="/app-mobile/_expo/static/js/web/index-e5f1b9c3f378967bdec34fed85cc0458.js" defer></script>
</body>
</html>
